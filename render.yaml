services:
  - type: web
    name: medivision-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.deploy.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_VISION_MODEL
        value: gpt-4.1-mini
      - key: MOCK_AI
        value: "false"
      - key: USE_LOCAL_ML
        value: "false"
      - key: CORS_ORIGINS
        sync: false
